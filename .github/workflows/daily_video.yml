name: 🎬 Auto Upload Video Emas Harian

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Fix warning Node.js

jobs:
  buat-dan-upload-video:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 🎬 Install FFmpeg
        run: sudo apt-get install -y ffmpeg

       - name: 📦 Install dependencies Python
        run: pip install requests beautifulsoup4 edge-tts google-api-python-client google-auth-oauthlib Pillow

      - name: 🎨 Install font untuk thumbnail
        run: sudo apt-get install -y fonts-open-sans fonts-liberation || true


      - name: 🔑 Setup semua credentials
        env:
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: |
          echo "$YOUTUBE_TOKEN_JSON" > youtube_token.json
          echo "GEMINI_API_KEY=$GEMINI_API_KEY" >> $GITHUB_ENV
          echo "PEXELS_API_KEY=$PEXELS_API_KEY" >> $GITHUB_ENV

      # DEBUG: Cek apakah secret sudah masuk (tidak tampilkan nilai, hanya cek ada/tidak)
      - name: 🔍 Verifikasi secrets
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "❌ GEMINI_API_KEY KOSONG!"
          else
            echo "✅ GEMINI_API_KEY OK (panjang: ${#GEMINI_API_KEY} karakter)"
          fi
          if [ -z "$PEXELS_API_KEY" ]; then
            echo "❌ PEXELS_API_KEY KOSONG!"
          else
            echo "✅ PEXELS_API_KEY OK (panjang: ${#PEXELS_API_KEY} karakter)"
          fi
          ls -la *.jpg *.png 2>/dev/null || echo "⚠️  Tidak ada gambar lokal di repo"
        env:
          GEMINI_API_KEY: ${{ env.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ env.PEXELS_API_KEY }}

      - name: 🚀 Jalankan script pembuat video
        run: python video_maker.py

      - name: 📋 Tampilkan log FFmpeg jika error
        if: failure()
        run: cat ffmpeg_log.txt || echo "Log tidak ditemukan"

      - name: 💾 Simpan video sebagai backup
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: video-emas-${{ github.run_number }}
          path: "Video_Emas_*.mp4"
          retention-days: 3


