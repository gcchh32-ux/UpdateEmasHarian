# .github/workflows/daily_video.yml
name: Auto Upload Video Emas Harian

on:
  schedule:
    # Jam 07:00 WIB = 00:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      channel_id:
        description: "Channel ID (1-5), kosong = semua channel"
        required: false
        default: ""

jobs:
  # ═══════════════════════════════════════════════════════
  # JOB MATRIX — jalankan semua channel secara paralel
  # ═══════════════════════════════════════════════════════
  upload_video:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        channel_id: [1, 2, 3, 4, 5]

    name: "Channel ${{ matrix.channel_id }}"

    steps:
      # ── 1. Checkout repo ──────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── 2. Python setup ───────────────────────────────
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Cache pip ──────────────────────────────────
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ── 4. Cache bank gambar & video ──────────────────
      - name: Cache Bank Gambar
        uses: actions/cache@v4
        with:
          path: gambar_bank/
          key: gambar-bank-ch${{ matrix.channel_id }}-${{ github.run_number }}
          restore-keys: |
            gambar-bank-ch${{ matrix.channel_id }}-

      - name: Cache Bank Video
        uses: actions/cache@v4
        with:
          path: video_bank/
          key: video-bank-ch${{ matrix.channel_id }}-${{ github.run_number }}
          restore-keys: |
            video-bank-ch${{ matrix.channel_id }}-

      # ── 5. Cache history harga ────────────────────────
      - name: Cache History Harga
        uses: actions/cache@v4
        with:
          path: history_harga.json
          key: history-harga-ch${{ matrix.channel_id }}-${{ github.run_number }}
          restore-keys: |
            history-harga-ch${{ matrix.channel_id }}-

      # ── 6. Install dependencies ───────────────────────
      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-dejavu-core \
            fonts-liberation python3-dev
          pip install --upgrade pip
          pip install -r requirements.txt

      # ── 7. Verifikasi tools ───────────────────────────
      - name: Verifikasi Instalasi
        run: |
          ffmpeg -version | head -1
          ffprobe -version | head -1
          python -c "import edge_tts; print('edge-tts OK')"
          python -c "from PIL import Image; print('Pillow OK')"
          python -c "from bs4 import BeautifulSoup; print('bs4 OK')"
          python -c "import requests; print('requests OK')"
          fc-list | grep -i dejavu | head -3

      # ── 8. Jalankan video maker ───────────────────────
      - name: Run Video Maker - Channel ${{ matrix.channel_id }}
        env:
          CHANNEL_ID:                 ${{ matrix.channel_id }}
          GEMINI_API_KEY:             ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY:             ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_TOKEN_JSON:         ${{ secrets[format('YOUTUBE_TOKEN_JSON_CH{0}', matrix.channel_id)] }}
          YOUTUBE_CLIENT_SECRET_JSON: ${{ secrets.YOUTUBE_CLIENT_SECRET_JSON }}
        run: |
          echo "======================================"
          echo " CHANNEL ${{ matrix.channel_id }} START"
          echo " $(date '+%Y-%m-%d %H:%M:%S WIB')"
          echo "======================================"
          python video_maker.py
          echo "======================================"
          echo " CHANNEL ${{ matrix.channel_id }} DONE"
          echo "======================================"

      # ── 9. Upload artifacts jika gagal ───────────────
      - name: Upload FFmpeg Log (jika gagal)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-log-ch${{ matrix.channel_id }}
          path: ffmpeg_log.txt
          retention-days: 3

      - name: Upload Video (jika berhasil)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: video-ch${{ matrix.channel_id }}-${{ github.run_number }}
          path: "Video_Emas_*.mp4"
          retention-days: 1

      - name: Upload Thumbnail (jika berhasil)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: thumb-ch${{ matrix.channel_id }}-${{ github.run_number }}
          path: "thumbnail_*.jpg"
          retention-days: 3
