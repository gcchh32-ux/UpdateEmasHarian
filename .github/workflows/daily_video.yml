# .github/workflows/daily_video.yml
name: Auto Upload Video Emas

on:
  schedule:
    - cron: "0 1 * * *"   # Jam 07:00 WIB — sama semua repo, beda akun jadi tidak masalah
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - name: Cache Bank Gambar
        uses: actions/cache@v4
        with:
          path: gambar_bank/
          key: gambar-${{ github.run_number }}
          restore-keys: gambar-

      - name: Cache Bank Video
        uses: actions/cache@v4
        with:
          path: video_bank/
          key: video-${{ github.run_number }}
          restore-keys: video-

      - name: Cache History Harga
        uses: actions/cache@v4
        with:
          path: history_harga.json
          key: history-${{ github.run_number }}
          restore-keys: history-

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-dejavu-core --no-install-recommends
          pip install -r requirements.txt --quiet

      - name: Run Video Maker
        env:
          CHANNEL_ID:                 ${{ vars.CHANNEL_ID }}
          GEMINI_API_KEY:             ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY:             ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_TOKEN_JSON:         ${{ secrets.YOUTUBE_TOKEN_JSON }}
          YOUTUBE_CLIENT_SECRET_JSON: ${{ secrets.YOUTUBE_CLIENT_SECRET_JSON }}
        run: python video_maker.py

      - name: Upload Log (gagal)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: log-${{ github.run_number }}
          path: "*.txt"
          if-no-files-found: ignore
          retention-days: 3

      - name: Upload Thumbnail (sukses)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: thumb-${{ github.run_number }}
          path: "thumbnail_*.jpg"
          if-no-files-found: ignore
          retention-days: 7


