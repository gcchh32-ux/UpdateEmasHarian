name: 🎬 Auto Upload Video Emas Harian

on:
  schedule:
    - cron: '0 0 * * *'   # Setiap hari jam 07:00 WIB (00:00 UTC)
  workflow_dispatch:        # Bisa trigger manual dari tab Actions

jobs:
  buat-dan-upload-video:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 🎬 Install FFmpeg
        run: sudo apt-get install -y ffmpeg

      - name: 📦 Install dependencies Python
        run: |
          pip install requests beautifulsoup4 edge-tts \
          google-api-python-client google-auth-oauthlib

      - name: 🔑 Setup semua credentials
        env:
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY:     ${{ secrets.PEXELS_API_KEY }}
        run: |
          echo "$YOUTUBE_TOKEN_JSON" > youtube_token.json
          echo "GEMINI_API_KEY=$GEMINI_API_KEY"   >> $GITHUB_ENV
          echo "PEXELS_API_KEY=$PEXELS_API_KEY"   >> $GITHUB_ENV

      - name: 🚀 Jalankan script pembuat video
        run: python video_maker.py

      - name: 📋 Tampilkan log jika error
        if: failure()
        run: cat ffmpeg_log.txt || echo "Log tidak ditemukan"

      - name: 💾 Simpan video sebagai artifact (backup 3 hari)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: video-emas-${{ github.run_number }}
          path: "Video_Emas_*.mp4"
          retention-days: 3

