name: 🎬 Auto Upload Video Emas Harian

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  buat-dan-upload-video:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 🎬 Install FFmpeg
        run: sudo apt-get install -y ffmpeg

      - name: 📦 Install dependencies Python
        run: |
          pip install requests beautifulsoup4 edge-tts \
            google-api-python-client google-auth-oauthlib Pillow

      - name: 🎨 Install font untuk thumbnail
        run: |
          sudo apt-get install -y fonts-open-sans fonts-liberation || true
          fc-cache -fv || true

      - name: 🔑 Setup credentials
        env:
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: |
          echo "$YOUTUBE_TOKEN_JSON" > youtube_token.json
          echo "GEMINI_API_KEY=$GEMINI_API_KEY" >> $GITHUB_ENV
          echo "PEXELS_API_KEY=$PEXELS_API_KEY" >> $GITHUB_ENV

      - name: 🔍 Verifikasi secrets
        env:
          GEMINI_API_KEY: ${{ env.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ env.PEXELS_API_KEY }}
        run: |
          [ -z "$GEMINI_API_KEY" ]  && echo "❌ GEMINI_API_KEY KOSONG!"  || echo "✅ GEMINI_API_KEY OK (${#GEMINI_API_KEY} char)"
          [ -z "$PEXELS_API_KEY" ]  && echo "❌ PEXELS_API_KEY KOSONG!"  || echo "✅ PEXELS_API_KEY OK (${#PEXELS_API_KEY} char)"
          ls -la youtube_token.json && echo "✅ youtube_token.json OK" || echo "❌ Token tidak ada!"
          ffmpeg -version | head -1
          python --version

      - name: 🚀 Jalankan script pembuat video
        run: python video_maker.py

      - name: 🔍 Debug — cek file hasil
        if: always()
        run: |
          echo "=== File video ==="
          ls -lh Video_Emas_*.mp4 2>/dev/null || echo "❌ Tidak ada file video!"
          echo "=== File thumbnail ==="
          ls -lh thumbnail_*.jpg 2>/dev/null || echo "Tidak ada thumbnail"
          echo "=== Upload history ==="
          cat upload_history.json 2>/dev/null || echo "Belum ada upload history"
          echo "=== Storage ==="
          du -sh gambar_bank/ video_bank/ 2>/dev/null || true

      - name: 📋 Log FFmpeg jika error
        if: failure()
        run: |
          echo "=== FFMPEG LOG ==="
          cat ffmpeg_log.txt 2>/dev/null | tail -100 || echo "Log tidak ditemukan"

      - name: 💾 Backup video sebagai artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: video-emas-${{ github.run_number }}
          path: |
            Video_Emas_*.mp4
            thumbnail_*.jpg
            ffmpeg_log.txt
            upload_history.json
          if-no-files-found: warn
          retention-days: 5
